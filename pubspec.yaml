name: viewer_file_image
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  file_picker: ^8.0.3
  path_provider: ^2.1.3

flutter_launcher_icons:
  android: true
  ios: true
  linux:
    generate: true
    image_path: "assets/icon/favicon.ico"
  windows:
    generate: true
    image_path: "assets/icon/favicon.ico"
  web:
    generate: true
    image_path: "assets/icon/favicon.png"
  image_path: "assets/icon/favicon.png"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
